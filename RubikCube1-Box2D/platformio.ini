[env:rubik-cube1]
platform = espressif32
board = esp32dev
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_ram_size = 8716288
framework = arduino
upload_speed = 921600
monitor_speed = 115200
lib_deps = 
	lovyan03/LovyanGFX @ ^1.2.19
	https://gitee.com/piolib/box2d.git
	https://gitee.com/piolib/FastIMU.git

build_flags = 
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue

; upload_protocol = espota
; upload_port = 192.168.1.162